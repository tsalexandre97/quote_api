name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t quote-api .

      - name: Lint
        run: docker run quote-api npm run lint

      - name: Tests
        run: docker run quote-api npm test

      - name: Coverage
        run: docker run quote-api npm run coverage